name: Publish Container Image

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-push:
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    runs-on: ubuntu-24.04
    steps:
      - run: |
          t=$(gh api --jq .commit.author.date "${ENDPOINT}")
          echo "mod-time=${t}" >> "${GITHUB_OUTPUT}"
        id: mod-time
        env:
          ENDPOINT: /repos/${{ github.repository }}/commits/${{ github.sha }}
          GH_TOKEN: ${{ github.token }}

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{commit_date 'YYYYMMDDHHmmss'}},enable={{is_default_branch}}
            type=sha
            type=ref,event=branch,enable={{is_not_default_branch}}

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build-and-push
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            MOD_TIME=${{ steps.mod-time.outputs.mod-time }}
            REVISION=${{ github.sha }}

      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

  dispatch:
    needs:
      - build-and-push
    permissions:
      actions: write
    runs-on: ubuntu-24.04
    steps:
      - name: Dispatch Deploy Workflow
        run: |
          gh workflow run deploy.yml \
            --repo "${REPO}" \
            --ref "${REF}"
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
