name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    uses: typisttech/.github/.github/workflows/audit-go.yml@7b89b88a2e9768adc532a741ec37de5921ad248e # v5.1.1
    with:
      go-experiment: jsonv2
