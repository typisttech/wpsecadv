name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@617c38e301cb42b0a1edd3ef84ef50663e0a98ab # v5.5.1
    with:
      go-experiment: jsonv2
