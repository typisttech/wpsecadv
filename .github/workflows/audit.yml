name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@425aa142db9be374681ec7380bb263eecd1b1513 # v6.1.1
    with:
      go-experiment: jsonv2
