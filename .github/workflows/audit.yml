name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@95ea7526f979e0b424ac15bd7efc7a49c968c947 # v5.5.0
    with:
      go-experiment: jsonv2
