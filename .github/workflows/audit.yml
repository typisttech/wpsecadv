name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@66b52ec4effdadb226ce10665c4a7e201c6a53c6 # v6.1.3
    with:
      go-experiment: jsonv2
