name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 3 * * 1' # Weekly on Monday
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        env:
          GOEXPERIMENT: jsonv2
