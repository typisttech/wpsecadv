name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 3 * * 1' # Weekly on Monday
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    uses: typisttech/.github/.github/workflows/audit-go.yml@95a3cb060227892cf7956e2564a8c89d578620da # v5.1.0
    with:
      go-experiment: jsonv2
