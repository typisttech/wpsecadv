name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@669be3950e61773155dddbf4822ee9ed82838393 # v6.1.2
    with:
      go-experiment: jsonv2
