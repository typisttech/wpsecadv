name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@d7196e1892ee4696e067a314645873982ea6046e # v6.0.1
    with:
      go-experiment: jsonv2
