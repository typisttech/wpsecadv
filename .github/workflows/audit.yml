name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    uses: typisttech/.github/.github/workflows/audit-go.yml@3b989be3639ac84acd7770ad0795ffbfc6193b2b # v5.2.2
    with:
      go-experiment: jsonv2
