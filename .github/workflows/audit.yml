name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '7 2 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@41e02b4d980e4ad9231ecdc6a0230b1b0a27178d # v5.5.3
    with:
      go-experiment: jsonv2
