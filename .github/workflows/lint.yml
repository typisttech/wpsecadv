name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOEXPERIMENT: jsonv2

jobs:
  actions:
    uses: typisttech/.github/.github/workflows/lint-actions.yml@95ea7526f979e0b424ac15bd7efc7a49c968c947 # v5.5.0

  go:
    uses: typisttech/.github/.github/workflows/lint-go.yml@95ea7526f979e0b424ac15bd7efc7a49c968c947 # v5.5.0
    with:
      go-experiment: jsonv2
      golangci-lint: true
      golangci-lint-version-file: .tool-versions

  fly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: fly.toml

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
      - run: flyctl config validate --strict
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ORG_READONLY }}

  wait-for-all-lint:
    if: cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure')
    needs:
      - actions
      - go
      - fly
    runs-on: ubuntu-latest
    steps:
      - name: Assert no required jobs were cancelled or failed
        run: exit 1
