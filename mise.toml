[env]
GOEXPERIMENT = "jsonv2"
DOCKER = "docker"

[tasks.upgrade]
run = [
  'mise upgrade --bump --local',
  'go get -u -t -tags e2econtainer,e2escripts ./...',
  'go mod tidy',
]

[tasks.serve]
run = 'go run ./cmd/serve'

[tasks.image]
depends = [{ task = "image:build" }]
run = '''
#!/usr/bin/env bash
set -e

port="$(go run ./cmd/freeport)"

echo "==> Starting container at http://127.0.0.1:${port}"
"${DOCKER}" run --rm -p "${port}:8080" wpsecadv-dev
'''

[tasks."image:build"]
run = '''
#!/usr/bin/env bash
set -e

mod=$(TZ=UTC git show -s --format=%cd --date=format:%Y-%m-%dT%H:%M:%SZ HEAD)
rev=$(git rev-parse --short HEAD)

if ! git diff --quiet --exit-code HEAD --; then
  mod=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
  rev="${rev}-dirty"
fi

${DOCKER} build \
  --build-arg MOD_TIME=${mod} \
  --build-arg REVISION=${rev} \
  --tag wpsecadv-dev \
  .
'''

####################################
#
# Test
#
####################################
[tasks."test:unit"]
run = 'go test -count=1 -race -shuffle=on ./...'

[tasks."test:e2e:container"]
run = '''
#!/usr/bin/env bash
set -e

echo "==> Running e2e tests within containers. This could take a while..."
go test -tags=e2econtainer -count=1 -shuffle=on ./e2e/container/... $@
'''

[tasks."test:e2e:local"]
run = '''
#!/usr/bin/env bash
set -e

export TESTSCRIPT_COMPOSER_CACHE_DIR="$(composer global config cache-dir --absolute --quiet)"

port="$(go run ./cmd/freeport)"
export WPSECADV_SERVER_URL="http://127.0.0.1:${port}"

echo "==> Starting server in the background..."
# Enable job control so the background server gets its own process group,
# letting cleanup kill `go run` and its compiled child in one shot.
set -m
PORT="${port}" go run ./cmd/serve > /dev/null 2>&1 &
pgid=$!
set +m

cleanup () {
  echo "==> Cleaning up..."
  echo "Terminating the server (pgid: '"${pgid}"')..."
  kill -- -"${pgid}" 2>/dev/null || true
}
trap 'cleanup' EXIT

echo "==> Waiting for server '"${WPSECADV_SERVER_URL}/packages.json"' ready..."
curl --silent --output /dev/null --head --fail --retry 10 --retry-all-errors --retry-connrefused --retry-delay 1 "${WPSECADV_SERVER_URL}/packages.json"

echo "==> Running e2e tests with system composer. This could take a while..."
go test -tags=e2escripts -count=1 -shuffle=on ./e2e/scripts/... $@
'''

[tasks."test:e2e:update"]
run = 'UPDATE_SCRIPTS=1 mise run test:e2e:local'

[tasks."test:e2e:prod"]
env.WPSECADV_SERVER_URL = { value = "{{ get_env(name='WPSECADV_SERVER_URL', default='https://repo-wpsecadv.typist.tech') }}" }
run = '''
#!/usr/bin/env bash
set -e

echo "==> Waiting for server '"${WPSECADV_SERVER_URL}/packages.json"' ready..."
curl --silent --output /dev/null --head --fail --retry 10 --retry-all-errors --retry-connrefused --retry-delay 1 "${WPSECADV_SERVER_URL}/packages.json"

echo "==> Running e2e tests with system composer. This could take a while..."
go test -tags=e2escripts -count=1 -shuffle=on ./e2e/scripts/... $@
'''

####################################
#
# Lint
#
####################################
[tasks.lint]
depends = ['lint:*']

[tasks."lint:go"]
run = ['go mod tidy -diff', 'golangci-lint run']

[tasks."lint:mise"]
run = ['mise fmt --check']

[tasks."fix"]
depends = ['fix:*']

[tasks."fix:go"]
run = ['go mod tidy', 'golangci-lint run --fix']

[tasks."fix:mise"]
run = ['mise fmt']

####################################
#
# Code Generation & Cleanup
#
####################################
[tasks.gen]
env.WORDFENCE_INTELLIGENCE_API_KEY = { required = true, redact = true }
run = 'go generate ./...'

[tasks."gen:data:fixture"]
env.FEED_FIXTURE = { required = true }
run = '''
#!/usr/bin/env bash
set -e

export WORDFENCE_INTELLIGENCE_API_KEY="dummy"
export FEED_FIXTURE_DIR=$(dirname "${FEED_FIXTURE}")
export FEED_FIXTURE_BASENAME=$(basename "${FEED_FIXTURE}")

port="$(go run ./cmd/freeport)"
export WORDFENCE_FEED_URL="http://127.0.0.1:${port}/${FEED_FIXTURE_BASENAME}"

echo "==> Starting fixture server in the background..."
set -m
go run ./cmd/servefixture "127.0.0.1:${port}" "${FEED_FIXTURE_DIR}" > /dev/null 2>&1 &
pgid=$!
set +m

cleanup () {
  echo "==> Cleaning up..."
  echo "Terminating the server (pgid: '"${pgid}"')..."
  kill -- -"${pgid}" 2>/dev/null || true
}
trap 'cleanup' EXIT

echo "==> Waiting for server '"${WORDFENCE_FEED_URL}"' ready..."
curl --silent --output /dev/null --head --fail --retry 10 --retry-all-errors --retry-connrefused --retry-delay 1 "${WORDFENCE_FEED_URL}"

echo "==> Generating data from fixture..."
go generate ./internal/data $@
'''

[tasks."gen:packagist"]
run = 'go generate ./internal/packagist'

[tasks.clean]
depends = ["clean:*"]

[tasks."clean:data"]
run = [
  'rm -rf internal/data/assets',
  'rm -rf internal/data/assets_gen.go',
  'rm -rf internal/data/assets_gen_test.go',
]

[tasks."clean:packagist"]
run = 'rm -rf internal/packagist/core_gen.go'

[tasks."clean:test"]
run = 'rm -rf _artifacts'
