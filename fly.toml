app = "wpsecadv"
primary_region = "iad"
kill_timeout = "60s"

[build]
  image = "ghcr.io/typisttech/wpsecadv:latest"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "1s"
    timeout = "3s"
    grace_period = "5s"
    method = "GET"
    path = "/up"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
